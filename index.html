<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3年生1学期中間</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0eeea;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --text: #1a1a18; --text2: #6b6a65;
    --blue: #378ADD; --blue-dark: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green: #639922; --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #639922;
    --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #501313; --red-border: #E24B4A;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #262624; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #f0efe9; --text2: #9a9990;
      --blue-bg: #0c3360; --blue-text: #85b7eb;
      --green-bg: #1a3009; --green-text: #97c459; --green-border: #639922;
      --red-bg: #3d1010; --red-text: #f09595; --red-border: #c04040;
    }
  }
  body {
    font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: flex-start;
    justify-content: center; padding: 32px 16px 64px;
  }
  #app { width: 100%; max-width: 620px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.3px; }
  h1 span { font-size: 13px; font-weight: 400; color: var(--text2); margin-left: 8px; }
  .subject-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  .subject-btn {
    padding: 16px; border: 0.5px solid var(--border2); border-radius: var(--radius-lg);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 15px; font-weight: 500; text-align: left;
    transition: background 0.12s; font-family: inherit;
  }
  .subject-btn:hover { background: var(--surface2); }
  .subject-btn .sub-count { display: block; font-size: 12px; font-weight: 400; color: var(--text2); margin-top: 4px; }
  .subject-btn.all-btn { grid-column: 1/-1; }
  .score-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .score-cell { flex: 1; background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; text-align: center; }
  .score-num { font-size: 22px; font-weight: 600; line-height: 1; }
  .score-num.c { color: var(--green); } .score-num.w { color: var(--red); }
  .score-label { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .tag { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--blue-bg); color: var(--blue-text); margin-bottom: 10px; font-weight: 500; }
  .progress { font-size: 12px; color: var(--text2); text-align: right; margin-bottom: 10px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s ease; }
  .question-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; font-size: 15px; line-height: 1.75; margin-bottom: 14px; min-height: 72px; }
  .choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .choice-btn {
    padding: 13px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px;
    text-align: left; font-family: inherit; line-height: 1.5;
    transition: background 0.12s, border-color 0.12s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .choice-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--blue); }
  .choice-btn:disabled { cursor: default; }
  .choice-label { min-width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; color: var(--text2); }
  .choice-btn.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .choice-btn.correct .choice-label { background: var(--green); color: white; border-color: var(--green); }
  .choice-btn.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .choice-btn.wrong .choice-label { background: var(--red); color: white; border-color: var(--red); }
  .choice-btn.reveal-correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .choice-btn.reveal-correct .choice-label { background: var(--green); color: white; border-color: var(--green); }
  .result-msg { padding: 11px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .result-msg.ok { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .result-msg.ng { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .btn-row { display: flex; gap: 8px; }
  .btn-primary { padding: 11px 22px; background: var(--blue); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.12s; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-secondary { padding: 11px 18px; background: var(--surface); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.12s; }
  .btn-secondary:hover { background: var(--surface2); }
  .finish-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px 24px; text-align: center; }
  .finish-rate { font-size: 52px; font-weight: 700; color: var(--blue); line-height: 1; margin-bottom: 8px; }
  .finish-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
  #screen-quiz { display: none; } #screen-finish { display: none; }

  /* ── 活用クイズ専用スタイル ── */
  #screen-katsuyou { display:none; }
  .k-info-card{
    background:var(--surface);border:0.5px solid var(--border);
    border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:14px;
    display:flex;gap:12px;flex-wrap:wrap;align-items:center;
  }
  .k-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--blue-bg);color:var(--blue-text);font-weight:500;}
  .k-info{font-size:14px;} .k-info span{color:var(--text2);font-size:12px;margin-right:4px;}
  .k-table-wrap{overflow-x:auto;margin-bottom:16px;}
  .k-table{border-collapse:collapse;width:100%;min-width:440px;}
  .k-table th{background:var(--surface2);border:0.5px solid var(--border2);padding:7px 8px;font-size:12px;font-weight:500;color:var(--text2);text-align:center;white-space:nowrap;}
  .k-table td{border:0.5px solid var(--border2);padding:5px 6px;text-align:center;font-size:13px;background:var(--surface);}
  .k-drop{min-width:64px;min-height:34px;border:1.5px dashed var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:background .12s,border-color .12s;}
  .k-drop.over{background:var(--blue-bg);border-color:var(--blue);}
  .k-drop.kfilled{border-style:solid;border-color:var(--blue);background:var(--blue-bg);color:var(--blue-text);font-weight:500;}
  .k-drop.kcorrect{border-color:var(--green-bd);background:var(--green-bg);color:var(--green-text);}
  .k-drop.kwrong{border-color:var(--red-bd);background:var(--red-bg);color:var(--red-text);}
  .k-bank{display:flex;flex-wrap:wrap;gap:8px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:16px;min-height:52px;}
  .k-tile{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);cursor:grab;font-size:13px;font-weight:500;user-select:none;-webkit-user-select:none;transition:background .12s,box-shadow .12s,opacity .12s;touch-action:none;}
  .k-tile:hover{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);}
  .k-tile.kselected{background:var(--blue);color:white;border-color:var(--blue-dark);box-shadow:0 2px 8px rgba(55,138,221,.3);}
  .k-tile.kdragging{opacity:.3;}
  .k-tile.kused{opacity:.2;pointer-events:none;}
  #k-drag-clone{position:fixed;pointer-events:none;z-index:9999;padding:6px 12px;border-radius:var(--radius);background:var(--blue);color:white;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,0.2);transform:translate(-50%,-50%);display:none;}

  .ss-input{border:1px solid var(--border2);border-radius:4px;background:var(--surface2);color:var(--text);font-size:14px;padding:2px 6px;outline:none;font-family:inherit;vertical-align:middle;transition:border-color .12s;}
  .ss-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(55,138,221,.15);}
  .ss-input.ss-ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-text);}
  .ss-input.ss-ng{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-text);}
  .ss-hint{font-size:12px;color:var(--green-text);font-weight:600;margin:0 2px;}
  #screen-sistan{display:none;}
  #screen-sistan-finish{display:none;}

  .s-blank{display:inline-block;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:0 6px;min-width:28px;text-align:center;cursor:pointer;color:transparent;user-select:none;font-size:14px;transition:all .15s;}
  .s-blank:hover{border-color:var(--blue);}
  .s-blank.revealed{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-text);cursor:default;}

  /* Advanced Mode */
  body.adv-mode { background: #FAD2B8; }
  body.adv-mode .progress-bar { background: rgba(0,0,0,0.08); }
  .adv-cover {
    display:inline-block;
    background:var(--surface2);
    border:1px dashed var(--border2);
    border-radius:4px;
    padding:0 10px;
    color:var(--text2);
    font-size:13px;
    cursor:pointer;
    user-select:none;
  }
  .adv-text { display:none; }
  #adv-toggle {
    font-size:12px;
    padding:5px 10px;
    border:0.5px solid var(--border2);
    border-radius:var(--radius);
    background:var(--surface);
    color:var(--text2);
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
  }
  #adv-toggle.active {
    background:#FAD2B8;
    border-color:#F5A623;
    color:#B87000;
    font-weight:500;
  }

  .choice-label.label-A{background:#E24B4A;color:#fff;border-color:#C73A3A;}
  .choice-label.label-B{background:#378ADD;color:#fff;border-color:#2872B8;}
  .choice-label.label-C{background:#E8B339;color:#fff;border-color:#C99620;}
  .choice-label.label-D{background:#639922;color:#fff;border-color:#4F7A1B;}
  .choice-btn.correct .choice-label.label-A,.choice-btn.correct .choice-label.label-B,.choice-btn.correct .choice-label.label-C,.choice-btn.correct .choice-label.label-D,
  .choice-btn.reveal-correct .choice-label.label-A,.choice-btn.reveal-correct .choice-label.label-B,.choice-btn.reveal-correct .choice-label.label-C,.choice-btn.reveal-correct .choice-label.label-D{background:var(--green);border-color:var(--green);}
  .choice-btn.wrong .choice-label.label-A,.choice-btn.wrong .choice-label.label-B,.choice-btn.wrong .choice-label.label-C,.choice-btn.wrong .choice-label.label-D{background:var(--red);border-color:var(--red);}

  .choice-btn.opt-A{background:#FAD2D2;border-color:#E8807F;}
  .choice-btn.opt-B{background:#CFE6FA;border-color:#6FAEE0;}
  .choice-btn.opt-C{background:#FAEBB0;border-color:#E0B940;}
  .choice-btn.opt-D{background:#CDE8B9;border-color:#74AD4F;}
  .choice-btn.opt-A:hover,.choice-btn.opt-B:hover,.choice-btn.opt-C:hover,.choice-btn.opt-D:hover{filter:brightness(0.95);}
  .choice-label.label-A{background:#E24B4A;color:#fff;border-color:#C73A3A;}
  .choice-label.label-B{background:#378ADD;color:#fff;border-color:#2872B8;}
  .choice-label.label-C{background:#E0B940;color:#fff;border-color:#C99B1F;}
  .choice-label.label-D{background:#5B9A3A;color:#fff;border-color:#477A2C;}
  .choice-btn.correct{background:#CDEAB0!important;border:3px solid #3E8914!important;box-shadow:0 0 0 2px rgba(62,137,20,0.25)!important;}
  .choice-btn.wrong{background:#F8C1C0!important;border:3px solid #C62828!important;box-shadow:0 0 0 2px rgba(198,40,40,0.25)!important;}
  .choice-btn.reveal-correct{background:#CDEAB0!important;border:3px solid #3E8914!important;box-shadow:0 0 0 2px rgba(62,137,20,0.25)!important;}
  .choice-btn.correct .choice-label,.choice-btn.reveal-correct .choice-label{background:#3E8914!important;color:#fff!important;border-color:#3E8914!important;}
  .choice-btn.wrong .choice-label{background:#C62828!important;color:#fff!important;border-color:#C62828!important;}

  #quiz-random-toggle.active {
    background:#E6F1FB;
    border-color:#378ADD;
    color:#185FA5;
    font-weight:500;
  }

  #screen-element{display:none;}
  #screen-element-finish{display:none;}
  .el-question-card{
    background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);
    padding:28px 20px;margin-bottom:18px;text-align:center;
  }
  .el-question-text{font-size:18px;font-weight:600;margin-bottom:4px;}
  .el-display{
    font-size:36px;font-weight:700;letter-spacing:2px;
    background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius);
    padding:14px;margin:16px auto;max-width:200px;min-height:54px;
    display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .el-display.el-correct{background:#CDEAB0;border:3px solid #3E8914;color:#1F4D0A;}
  .el-display.el-wrong{background:#F8C1C0;border:3px solid #C62828;color:#5A0000;}
  .el-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:260px;margin:0 auto;}
  .el-key{
    padding:16px 0;font-size:20px;font-weight:600;border-radius:var(--radius);
    border:0.5px solid var(--border2);background:var(--surface);color:var(--text);
    cursor:pointer;font-family:inherit;transition:background .12s;
  }
  .el-key:hover{background:var(--surface2);}
  .el-key.el-clear{color:var(--red-text);}
  .el-key.el-enter{background:var(--blue);color:#fff;border-color:var(--blue-dark);grid-column:span 2;}
  .el-key.el-enter:hover{background:var(--blue-dark);}
  .el-key:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>
<div id="app">
  <div id="screen-home">
    <h1>クイズ <span>学期を選んでください</span></h1>
    <div class="subject-grid">
      <button class="subject-btn all-btn" onclick="showTerm('term1')">3年1学期中間</button>
      <button class="subject-btn all-btn" onclick="showTerm('term2')">3年1学期期末</button>
    </div>
  </div>

  <div id="screen-select" style="display:none;">
    <h1 id="term-title">クイズ <span>教科を選んでください</span></h1>
    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
      <button class="btn-secondary" onclick="goHome()">← 学期選択に戻る</button>
      <button class="btn-secondary" onclick="showList()">📋 問題一覧・回答を見る</button>
    </div>
    <div class="subject-grid" id="subject-grid-term1">
      <button class="subject-btn" onclick="startQuiz('civics')">公民<span class="sub-count">25問</span></button>
      <button class="subject-btn" onclick="startQuiz('chemistry')">化学基礎<span class="sub-count">20問</span></button>
      <button class="subject-btn" onclick="startQuiz('biology')">生物分野<span class="sub-count">15問</span></button>
      <button class="subject-btn" onclick="startQuiz('flame')">炎色反応<span class="sub-count">14問</span></button>
      <button class="subject-btn" onclick="startQuiz('classification')">物質の分類<span class="sub-count">15問</span></button>
      <button class="subject-btn" onclick="startQuiz('statechange')">状態変化・熱運動<span class="sub-count">12問</span></button>
      <button class="subject-btn" onclick="startQuiz('atom')">原子の構成<span class="sub-count">18問</span></button>
      <button class="subject-btn" onclick="startQuiz('electron')">電子配置・イオン<span class="sub-count">16問</span></button>
      <button class="subject-btn" onclick="startQuiz('periodic')">周期表<span class="sub-count">12問</span></button>
      <button class="subject-btn" onclick="startQuiz('separation')">分離法<span class="sub-count">10問</span></button>
      <button class="subject-btn" onclick="startQuiz('eng_sentence')">英語：文の種類<span class="sub-count">21問</span></button>
      <button class="subject-btn" onclick="startQuiz('eng_pattern')">英語：基本文型<span class="sub-count">14問</span></button>
      <button class="subject-btn" onclick="startQuiz('eng_fill')">英語：穴埋め<span class="sub-count">17問</span></button>
      <button class="subject-btn" onclick="startQuiz('japan_constitution_fill')">公民：日本国憲法穴埋め<span class="sub-count">22問</span></button>
      <button class="subject-btn" onclick="startQuiz('kogo')">古文：ちごのそら寝<span class="sub-count">17問</span></button>
      <button class="subject-btn" onclick="startQuiz('kogo_grammar')">古文：古典文法・仮名遣い<span class="sub-count">15問</span></button>
      <button class="subject-btn" onclick="startQuiz('ikiru')">国語A：生きるということ<span class="sub-count">11問</span></button>
      <button class="subject-btn" onclick="startQuiz('akushu')">国語A：握手<span class="sub-count">16問</span></button>
      <button class="subject-btn all-btn" onclick="startQuiz('all')">全教科まとめて<span class="sub-count">290問すべて</span></button>
    </div>
    <div class="subject-grid" id="subject-grid-term2" style="display:none;">
      <button class="subject-btn" onclick="startQuiz('rekishi_sogo1')">歴史総合①<span class="sub-count">29問</span></button>
      <button class="subject-btn" onclick="startQuiz('rekishi_sogo2')">歴史総合②<span class="sub-count">27問</span></button>
      <button class="subject-btn" onclick="startQuiz('rekishi_sogo3')">歴史総合③<span class="sub-count">20問</span></button>
      <button class="subject-btn" onclick="startQuiz('rekishi_sogo4')">歴史総合④<span class="sub-count">14問</span></button>
      <button class="subject-btn all-btn" onclick="startKatsuyou()">活用表穴埋め<span class="sub-count">13種類</span></button>
      <button class="subject-btn all-btn" onclick="startSistan()">シス単 穴埋め<span class="sub-count">49問</span></button>
      <button class="subject-btn" onclick="startQuiz('chemistry_a')">化学基礎A（イオン・周期表）<span class="sub-count">33問</span></button>
      <button class="subject-btn" onclick="startQuiz('chemistry_b')">化学基礎B（化学結合・イオン結晶）<span class="sub-count">30問</span></button>
      <button class="subject-btn" onclick="startQuiz('chemistry_c')">化学基礎C（共有結合・電子式）<span class="sub-count">30問</span></button>
      <button class="subject-btn" onclick="startElementQuiz()">元素番号（原子番号1〜20）<span class="sub-count">20問</span></button>
      <button class="subject-btn" onclick="startQuiz('chiri')">地理総合<span class="sub-count">30問</span></button>
    </div>
  </div>

  <div id="screen-quiz">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span class="tag" id="subject-tag"></span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="quiz-random-toggle" class="active" onclick="toggleQuizRandom()" style="font-size:12px;padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;">🔀 ランダム: ON</button>
        <button id="adv-toggle" onclick="toggleAdvanced()">🔶 アドバンス: OFF</button>
        <button id="adv-reveal-all" onclick="revealAllChoices()" style="display:none;font-size:12px;padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;">👁 すべて表示</button>
        <span class="progress" id="progress-text"></span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-row">
      <div class="score-cell"><div class="score-num c" id="sc-c">0</div><div class="score-label">正解</div></div>
      <div class="score-cell"><div class="score-num w" id="sc-w">0</div><div class="score-label">不正解</div></div>
      <div class="score-cell"><div class="score-num" id="sc-t">0</div><div class="score-label">合計</div></div>
    </div>
    <div class="question-card" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div id="result-area"></div>
    <div class="btn-row" id="next-area" style="display:none;margin-top:4px;">

function revealAllChoices(){

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function startQuiz(s){
  state.subject=s;
  const pool=s==='all'?[...QDB.civics,...QDB.chemistry,...QDB.biology,...QDB.flame,...QDB.classification,...QDB.statechange,...QDB.atom,...QDB.electron,...QDB.periodic,...QDB.separation,...QDB.eng_sentence,...QDB.eng_pattern,...QDB.eng_fill,...QDB.japan_constitution_fill,...QDB.kogo,...QDB.kogo_grammar,...QDB.ikiru,...QDB.akushu,...QDB.rekishi_sogo1,...QDB.rekishi_sogo2,...QDB.rekishi_sogo3,...QDB.rekishi_sogo4,...QDB.chiri,...QDB.chemistry_a,...QDB.chemistry_b,...QDB.chemistry_c]:[...QDB[s]];
  if(quizRandom) shuffle(pool);
  state.queue=pool;state.idx=0;state.correct=0;state.wrong=0;wrongAnswers=[];
  document.getElementById('screen-select').style.display='none';
  document.getElementById('screen-finish').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  showQuestion();
}

function showQuestion(){
  state.answered=false;
  const q=state.queue[state.idx];
  const total=state.queue.length;
  document.getElementById('subject-tag').textContent=LABELS[state.subject];
  document.getElementById('progress-text').textContent=(state.idx+1)+' / '+total;
  document.getElementById('progress-fill').style.width=((state.idx/total)*100)+'%';
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('result-area').innerHTML='';
  document.getElementById('next-area').style.display='none';
  const labels=['A','B','C','D'];
  const choices=shuffle([q.a,...q.w.slice(0,3)]);
  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    if(advancedMode){
      btn.dataset.revealed='false';
      btn.classList.add("opt-"+labels[i]);
      btn.innerHTML=`<span class="choice-label label-${labels[i]}">${labels[i]}</span><span class="adv-cover">タップして表示</span><span class="adv-text">${c}</span>`;
      btn.onclick=()=>{
        if(state.answered) return;
        if(btn.dataset.revealed==='false'){
          revealAllChoices();
        } else {
          selectChoice(c,q.a,choices);
        }
      };
    } else {
      btn.classList.add("opt-"+labels[i]);
      btn.innerHTML=`<span class="choice-label label-${labels[i]}">${labels[i]}</span><span>${c}</span>`;
      btn.onclick=()=>selectChoice(c,q.a,choices);
    }
    container.appendChild(btn);
  });
  updateScore();
}

function selectChoice(selected,correct,choices){
  if(state.answered)return;
  state.answered=true;
  const btns=document.querySelectorAll('.choice-btn');
  const isCorrect=selected===correct;
  btns.forEach((btn,i)=>{
    btn.disabled=true;
    const text=choices[i];
    if(text===correct){btn.classList.add(isCorrect&&text===selected?'correct':'reveal-correct');}
    else if(text===selected){btn.classList.add('wrong');}
  });
  if(isCorrect){
    state.correct++;
    document.getElementById('result-area').innerHTML='<div class="result-msg ok">✓ 正解！</div>';
  } else {
    state.wrong++;
    wrongAnswers.push(state.queue[state.idx]);
    document.getElementById('result-area').innerHTML='<div class="result-msg ng">✗ 不正解　正解は緑色の選択肢</div>';
  }
  updateScore();
  document.getElementById('next-area').style.display='flex';
}

function updateScore(){
  document.getElementById('sc-c').textContent=state.correct;
  document.getElementById('sc-w').textContent=state.wrong;
  document.getElementById('sc-t').textContent=state.correct+state.wrong;
}

function nextQuestion(){
  state.idx++;
  if(state.idx>=state.queue.length){showFinish();return;}
  showQuestion();
}

function showFinish(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-finish').style.display='block';
  const total=state.correct+state.wrong;
  const rate=total>0?Math.round(state.correct/total*100):0;
  document.getElementById('finish-rate').textContent=rate+'%';
  document.getElementById('finish-sub').textContent=LABELS[state.subject]+' — '+total+'問中 '+state.correct+'問正解';
  document.getElementById('f-c').textContent=state.correct;
  document.getElementById('f-w').textContent=state.wrong;
  document.getElementById('retry-wrong-btn').style.display=wrongAnswers.length>0?'block':'none';
}

function retryWrong(){
  if(wrongAnswers.length===0)return;
  state.queue=[...wrongAnswers];
  shuffle(state.queue);
  wrongAnswers=[];
  state.idx=0;state.correct=0;state.wrong=0;state.answered=false;
  document.getElementById('screen-finish').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  showQuestion();
}

function replayQuiz(){startQuiz(state.subject);}

function renderList() {
  const filter = document.getElementById('list-filter').value;
  const termSubjects = TERM_SUBJECTS[currentTerm] || [];
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  listHideMode = false;
  document.getElementById('list-mode-btn').textContent = '👁 答えを隠す';

  const subjects = filter === 'all' ? termSubjects : [filter];

  subjects.forEach(subjectKey => {
    const isSistan = subjectKey === 'sistan';
    const questions = isSistan ? SISTAN : QDB[subjectKey];
    if(!questions) return;
    const label = LABELS[subjectKey] || subjectKey;

    const header = document.createElement('div');
    header.style.cssText = 'font-size:13px;font-weight:600;color:var(--blue-text);background:var(--blue-bg);padding:6px 12px;border-radius:var(--radius);margin-top:16px;margin-bottom:6px;';
    header.textContent = label + '（' + questions.length + '問）';
    container.appendChild(header);

    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;';

      let qText, aText;
      if(isSistan){
        // Build sentence with individually tappable blanks
        let sid = 'ss_' + i + '_';
        let sentHtml = q.tpl.map((p, pi) => {
          if(Array.isArray(p)){
            const word = p[0];
            const id = sid + pi;
            return `<span id="${id}" class="s-blank" data-word="${word}" onclick="revealBlank('${id}','${word.replace(/'/g,"\'")}')">___</span>`;
          }
          return p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }).join('');
        qText = q.jp + '<br><span style="font-size:14px;">' + sentHtml + '</span>';
        aText = null; // no separate answer div needed
      } else {
        qText = q.q;
        aText = q.a;
      }

      card.innerHTML =
        '<div style="font-size:13px;color:var(--text2);margin-bottom:4px;">' + (isSistan ? q.num : 'Q'+(i+1)) + '</div>' +
        '<div style="font-size:14px;line-height:1.8;margin-bottom:8px;">' + qText + '</div>';

      if(!isSistan){
        const ans = document.createElement('div');
        ans.className = 'list-ans';
        ans.style.cssText = 'font-size:13px;background:var(--green-bg);color:var(--green-text);border:0.5px solid var(--green-border);border-radius:6px;padding:6px 10px;display:inline-block;cursor:default;';
        ans.textContent = '✓ ' + aText;
        const tap = document.createElement('div');
        tap.className = 'list-tap';
        tap.style.cssText = 'font-size:13px;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);border-radius:6px;padding:6px 10px;display:none;cursor:pointer;user-select:none;';
        tap.textContent = 'タップして答えを見る';
        tap.onclick = function(){ revealAns(this); };
        card.appendChild(ans);
        card.appendChild(tap);
      }
      container.appendChild(card);
    });
  });

  if(container.children.length === 0) {
    container.innerHTML = '<div style="color:var(--text2);font-size:14px;text-align:center;padding:32px;">問題がありません</div>';
  }
}

let kIdx=0, kScore=0, kChecked=false, kSelected=null, kWrongIdxs=[], kRetryQueue=null;
let kCells=[null,null,null,null,null,null], kTiles=[];
let kDragging=null;
const kClone = ()=> document.getElementById('k-drag-clone');

function kShuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function kGetDZ(i){return document.querySelector(`.k-drop[data-ki="${i}"]`);}

function startKatsuyou(){

function kBuild(){
  kChecked=false; kSelected=null;
  kCells=[null,null,null,null,null,null]; kTiles=[];
  const actualKIdx = kRetryQueue ? kRetryQueue[kIdx] : kIdx;
  const d=KDATA[actualKIdx];
  const total=kRetryQueue ? kRetryQueue.length : KDATA.length;
  document.getElementById('k-prog-text').textContent=(kIdx+1)+' / '+total;
  document.getElementById('k-prog-fill').style.width=((kIdx/total)*100)+'%';
  document.getElementById('k-score-text').textContent='正解 '+kScore+' 問';
  document.getElementById('k-hinshi').textContent=d.hinshi;
  document.getElementById('k-type').textContent=d.type;
  document.getElementById('k-example').textContent=d.example;
  document.getElementById('k-gokan').textContent=d.gokan;
  document.getElementById('k-result-area').innerHTML='';
  document.getElementById('k-next-area').style.display='none';
  document.getElementById('k-btn-check').disabled=false;

  const row=document.getElementById('k-form-row');
  row.innerHTML='';
  for(let i=0;i<6;i++){
    const td=document.createElement('td');
    const dz=document.createElement('div');
    dz.className='k-drop'; dz.dataset.ki=i;
    dz.addEventListener('click',()=>kOnDZClick(i));
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');kOnDrop(i);});
    td.appendChild(dz); row.appendChild(td);
  }

  const pool=kShuffle([...d.answers,...d.decoys]);
  const bank=document.getElementById('k-bank'); bank.innerHTML='';
  pool.forEach((text,i)=>{
    const tile={id:i,text,used:false,el:null};
    const el=document.createElement('div');
    el.className='k-tile'; el.textContent=text; el.dataset.ktid=i;
    el.draggable=true;
    el.addEventListener('click',()=>kOnTileClick(i));
    el.addEventListener('dragstart',e=>kOnDragStart(e,i));
    el.addEventListener('dragend',()=>kOnDragEnd());
    el.addEventListener('touchstart',e=>kOnTouchStart(e,i),{passive:false});
    el.addEventListener('touchmove',e=>kOnTouchMove(e),{passive:false});
    el.addEventListener('touchend',e=>kOnTouchEnd(e,i),{passive:false});
    bank.appendChild(el); tile.el=el; kTiles.push(tile);
  });
}

function kOnTileClick(tid){
  if(kChecked) return;
  const tile=kTiles[tid]; if(tile.used) return;
  if(kSelected===tid){tile.el.classList.remove('kselected');kSelected=null;}
  else{if(kSelected!==null)kTiles[kSelected].el.classList.remove('kselected');tile.el.classList.add('kselected');kSelected=tid;}
}
function kOnDZClick(idx){
  if(kChecked) return;
  const dz=kGetDZ(idx);
  if(kSelected!==null){
    if(kCells[idx]!==null) kReturnTile(kCells[idx]);
    kCells[idx]=kSelected; const tile=kTiles[kSelected];
    tile.used=true; tile.el.classList.add('kused'); tile.el.classList.remove('kselected');
    dz.textContent=tile.text; dz.classList.add('kfilled'); kSelected=null;
  } else if(kCells[idx]!==null){
    kReturnTile(kCells[idx]); kCells[idx]=null;
    dz.textContent=''; dz.classList.remove('kfilled');
  }
}
function kReturnTile(tid){kTiles[tid].used=false; kTiles[tid].el.classList.remove('kused','kselected');}

function kOnDragStart(e,tid){if(kChecked)return;kDragging=tid;kTiles[tid].el.classList.add('kdragging');e.dataTransfer.effectAllowed='move';}
function kOnDragEnd(){if(kDragging!==null){kTiles[kDragging].el.classList.remove('kdragging');kDragging=null;}}
function kOnDrop(idx){
  if(kDragging===null||kChecked) return;
  const tid=kDragging;
  if(kCells[idx]!==null) kReturnTile(kCells[idx]);
  kCells[idx]=tid; kTiles[tid].used=true;
  kTiles[tid].el.classList.add('kused'); kTiles[tid].el.classList.remove('kdragging','kselected');
  kGetDZ(idx).textContent=kTiles[tid].text; kGetDZ(idx).classList.add('kfilled');
  kDragging=null;
}

let kTouchDragging=null;
function kOnTouchStart(e,tid){if(kChecked)return;e.preventDefault();kTouchDragging=tid;const cl=kClone();cl.textContent=kTiles[tid].text;cl.style.display='block';const t=e.touches[0];cl.style.left=t.clientX+'px';cl.style.top=t.clientY+'px';kTiles[tid].el.classList.add('kdragging');}
function kOnTouchMove(e){if(kTouchDragging===null)return;e.preventDefault();const t=e.touches[0];const cl=kClone();cl.style.left=t.clientX+'px';cl.style.top=t.clientY+'px';document.querySelectorAll('.k-drop').forEach(dz=>dz.classList.remove('over'));const el=document.elementFromPoint(t.clientX,t.clientY);const dz=el?.closest('.k-drop');if(dz)dz.classList.add('over');}
function kOnTouchEnd(e,tid){if(kTouchDragging===null)return;kClone().style.display='none';kTiles[tid].el.classList.remove('kdragging');document.querySelectorAll('.k-drop').forEach(dz=>dz.classList.remove('over'));const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const dz=el?.closest('.k-drop');if(dz){const idx=parseInt(dz.dataset.ki);if(kCells[idx]!==null)kReturnTile(kCells[idx]);kCells[idx]=tid;kTiles[tid].used=true;kTiles[tid].el.classList.add('kused');dz.textContent=kTiles[tid].text;dz.classList.add('kfilled');}else{kTiles[tid].el.classList.remove('kused');}kTouchDragging=null;}

function kCheck(){
  const actualKIdx = kRetryQueue ? kRetryQueue[kIdx] : kIdx;
  const d=KDATA[actualKIdx];
  if(kCells.some(c=>c===null)){document.getElementById('k-result-area').innerHTML='<div class="result-msg ng">すべてのマスを埋めてください。</div>';return;}
  kChecked=true; document.getElementById('k-btn-check').disabled=true;
  let correct=0;
  for(let i=0;i<6;i++){
    const dz=kGetDZ(i); const placed=kTiles[kCells[i]].text; const expected=d.answers[i];
    if(placed===expected){dz.classList.remove('kfilled');dz.classList.add('kcorrect');correct++;}
    else{dz.classList.remove('kfilled');dz.classList.add('kwrong');const ans=document.createElement('div');ans.style.cssText='font-size:11px;color:var(--green-text);margin-top:2px;';ans.textContent='→'+expected;dz.parentElement.appendChild(ans);}
  }
  if(correct===6) kScore++;
  else kWrongIdxs.push(kRetryQueue ? kRetryQueue[kIdx] : kIdx);
  document.getElementById('k-score-text').textContent='正解 '+kScore+' 問';
  document.getElementById('k-result-area').innerHTML=correct===6
    ?'<div class="result-msg ok">✓ 全問正解！</div>'
    :'<div class="result-msg ng">✗ 不正解あり。緑が正解、赤が不正解。→が正しい答えです。</div>';
  document.getElementById('k-next-area').style.display='block';
}
function kReset(){kBuild();}
function kNext(){
  kIdx++;
  const kTotal = kRetryQueue ? kRetryQueue.length : KDATA.length;
  if(kIdx>=kTotal){
    document.getElementById('screen-katsuyou').style.display='none';
    document.getElementById('screen-katsuyou-finish').style.display='block';
    document.getElementById('kf-rate').textContent=Math.round(kScore/kTotal*100)+'%';
    document.getElementById('kf-sub').textContent=kTotal+'種類中 '+kScore+'問全問正解';
    document.getElementById('k-retry-wrong-btn').style.display=kWrongIdxs.length>0?'block':'none';
  } else { kBuild(); }
}
function kRestart(){document.getElementById('screen-katsuyou-finish').style.display='none';document.getElementById('screen-katsuyou').style.display='block';kIdx=0;kScore=0;kWrongIdxs=[];kRetryQueue=null;kBuild();}
function kRetryWrong(){
  if(kWrongIdxs.length===0)return;
  kRetryQueue=[...kWrongIdxs];
  kWrongIdxs=[];
  kIdx=0;kScore=0;
  document.getElementById('screen-katsuyou-finish').style.display='none';
  document.getElementById('screen-katsuyou').style.display='block';
  kBuild();
}

let ssIdx=0,ssScore=0,ssChecked=false,ssQueue=[],ssRandom=false,ssWrongIdxs=[];

function toggleSistanRandom(){
  ssRandom=!ssRandom;
  document.getElementById('ss-random-btn').textContent='🔀 ランダム: '+(ssRandom?'ON':'OFF');
}

function ssShuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startSistan(){
  ['screen-home','screen-select','screen-quiz','screen-finish','screen-list',
   'screen-katsuyou','screen-katsuyou-finish','screen-sistan-finish'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  document.getElementById('screen-sistan').style.display='block';
  ssQueue=ssRandom?ssShuffle([...Array(SISTAN.length).keys()]):[...Array(SISTAN.length).keys()];
  ssIdx=0;ssScore=0;ssWrongIdxs=[];ssBuild();
}

function goSelectFromSistan(){
  ['screen-sistan','screen-sistan-finish'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  document.getElementById('screen-select').style.display='block';
}

function ssBuild(){
  ssChecked=false;
  const q=SISTAN[ssQueue[ssIdx]],total=ssQueue.length;
  document.getElementById('ss-prog').textContent=(ssIdx+1)+' / '+total;
  document.getElementById('ss-pfill').style.width=((ssIdx/total)*100)+'%';
  document.getElementById('ss-score').textContent='正解 '+ssScore+' 問';
  document.getElementById('ss-num').textContent=q.num;
  document.getElementById('ss-jp').textContent=q.jp;
  document.getElementById('ss-result').innerHTML='';
  document.getElementById('ss-next').style.display='none';
  document.getElementById('ss-btn-check').disabled=false;

  let html='',iIdx=0;
  q.tpl.forEach(part=>{
    if(typeof part==='string'){
      html+=part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    } else {
      const sz=Math.max(...part.map(a=>a.length),3)+2;
      html+=`<input class="ss-input" data-ssi="${iIdx}" size="${sz}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
      iIdx++;
    }
  });
  document.getElementById('ss-en').innerHTML=html;

  const inputs=document.querySelectorAll('.ss-input');
  inputs.forEach((inp,i)=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        e.stopPropagation();
        if(!ssChecked){
          if(i<inputs.length-1) inputs[i+1].focus();
          else ssCheck();
        }
      } else if(e.key==='Backspace'&&inp.value===''&&i>0){
        e.preventDefault();
        inputs[i-1].focus();
      }
    });
  });
  if(inputs[0])inputs[0].focus();
}

function ssCheck(){
  if(ssChecked)return;
  const q=SISTAN[ssQueue[ssIdx]];
  let iIdx=0,correct=0,total=0;
  q.tpl.forEach(part=>{
    if(Array.isArray(part)){
      const inp=document.querySelector(`.ss-input[data-ssi="${iIdx}"]`);
      const val=inp.value.trim().toLowerCase();
      const ok=part.map(a=>a.toLowerCase()).includes(val);
      inp.disabled=true;
      total++;
      if(ok){inp.classList.add('ss-ok');correct++;}
      else{inp.classList.add('ss-ng');inp.insertAdjacentHTML('afterend',`<span class="ss-hint">→${part[0]}</span>`);}
      iIdx++;
    }
  });
  ssChecked=true;
  if(correct===total)ssScore++;
  else ssWrongIdxs.push(ssQueue[ssIdx]);
  document.getElementById('ss-score').textContent='正解 '+ssScore+' 問';
  const allOk=correct===total;
  document.getElementById('ss-result').innerHTML=allOk
    ?'<div class="result-msg ok" style="font-size:16px;padding:14px;">✓ 全問正解！　Enter で次へ</div>'
    :`<div class="result-msg ng" style="font-size:16px;padding:14px;">✗ ${total}問中${correct}問正解　→ が正解　Enter で次へ</div>`;
  document.getElementById('ss-btn-check').disabled=true;
  document.getElementById('ss-next').style.display='block';
}

document.addEventListener('keydown',function(e){
  const screen=document.getElementById('screen-sistan');
  if(e.key==='Enter' && ssChecked && screen && screen.style.display!=='none'){
    e.preventDefault();
    ssNext();
  }
});

function ssNext(){
  ssIdx++;
  if(ssIdx>=ssQueue.length){
    document.getElementById('screen-sistan').style.display='none';
    document.getElementById('screen-sistan-finish').style.display='block';
    document.getElementById('ssf-rate').textContent=Math.round(ssScore/ssQueue.length*100)+'%';
    document.getElementById('ssf-sub').textContent=ssQueue.length+'問中 '+ssScore+'問全問正解';
    document.getElementById('ss-retry-wrong-btn').style.display=ssWrongIdxs.length>0?'block':'none';
  } else {ssBuild();}
}

function ssRestart(){
  document.getElementById('screen-sistan-finish').style.display='none';
  document.getElementById('screen-sistan').style.display='block';
  ssIdx=0;ssScore=0;ssBuild();
}


function revealBlank(id, word){
  const el = document.getElementById(id);
  if(!el) return;
  if(el.classList.contains('revealed')){
    el.classList.remove('revealed');
    el.style.color='transparent';
    el.textContent='___';
  } else {
    el.textContent=word;
    el.classList.add('revealed');
    el.style.color='';
  }
}

let elIdx=0, elScore=0, elInput='', elAnswered=false, elQueue=[], elWrongIdxs=[];

function startElementQuiz(){
  ['screen-home','screen-select','screen-quiz','screen-finish','screen-list',
   'screen-katsuyou','screen-katsuyou-finish','screen-sistan-finish','screen-sistan',
   'screen-element-finish'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  document.getElementById('screen-element').style.display='block';
  elQueue=shuffle([...Array(QDB.element_number.length).keys()]);
  elIdx=0; elScore=0; elWrongIdxs=[];
  elBuild();
}

function goSelectFromElement(){
  ['screen-element','screen-element-finish'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  document.getElementById('screen-select').style.display='block';
}

function elBuild(){
  elAnswered=false; elInput='';
  const q=QDB.element_number[elQueue[elIdx]];
  const total=elQueue.length;
  document.getElementById('el-prog').textContent=(elIdx+1)+' / '+total;
  document.getElementById('el-pfill').style.width=((elIdx/total)*100)+'%';
  document.getElementById('el-score').textContent='正解 '+elScore+' 問';
  document.getElementById('el-question').textContent=q.q;
  document.getElementById('el-result').innerHTML='';
  document.getElementById('el-next').style.display='none';
  const disp=document.getElementById('el-display');
  disp.textContent='_'; disp.classList.remove('el-correct','el-wrong');

  const keypad=document.getElementById('el-keypad');
  keypad.innerHTML='';
  const keys=['1','2','3','4','5','6','7','8','9','C','0','⏎'];
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='el-key'+(k==='C'?' el-clear':'')+(k==='⏎'?' el-enter':'');
    btn.textContent=k;
    btn.onclick=()=>elKeyPress(k);
    keypad.appendChild(btn);
  });
}

function elKeyPress(k){
  if(elAnswered) return;
  if(k==='C'){ elInput=''; }
  else if(k==='⏎'){ elCheck(); return; }
  else { if(elInput.length<2) elInput+=k; }
  document.getElementById('el-display').textContent = elInput===''?'_':elInput;
}

function elCheck(){
  if(elAnswered || elInput==='') return;
  elAnswered=true;
  const q=QDB.element_number[elQueue[elIdx]];
  const correct = elInput === q.a;
  const disp=document.getElementById('el-display');
  document.querySelectorAll('.el-key').forEach(b=>b.disabled=true);
  if(correct){
    elScore++;
    disp.classList.add('el-correct');
    document.getElementById('el-result').innerHTML='<div class="result-msg ok">✓ 正解！</div>';
  } else {
    elWrongIdxs.push(elQueue[elIdx]);
    disp.classList.add('el-wrong');
    document.getElementById('el-result').innerHTML='<div class="result-msg ng">✗ 不正解　正解は '+q.a+'</div>';
  }
  document.getElementById('el-score').textContent='正解 '+elScore+' 問';
  document.getElementById('el-next').style.display='block';
}

document.addEventListener('keydown', function(e){
  const screen=document.getElementById('screen-element');
  if(!screen || screen.style.display==='none') return;
  if(e.key>='0'&&e.key<='9'){ e.preventDefault(); elKeyPress(e.key); }
  else if(e.key==='Backspace'){ e.preventDefault(); elInput=''; document.getElementById('el-display').textContent='_'; }
  else if(e.key==='Enter'){
    e.preventDefault();
    if(!elAnswered) elCheck();
    else elNext();
  }
});

function elNext(){
  elIdx++;
  if(elIdx>=elQueue.length){
    document.getElementById('screen-element').style.display='none';
    document.getElementById('screen-element-finish').style.display='block';
    document.getElementById('elf-rate').textContent=Math.round(elScore/elQueue.length*100)+'%';
    document.getElementById('elf-sub').textContent=elQueue.length+'問中 '+elScore+'問正解';
    document.getElementById('el-retry-wrong-btn').style.display=elWrongIdxs.length>0?'block':'none';
  } else { elBuild(); }
}

function elRestart(){
  document.getElementById('screen-element-finish').style.display='none';
  document.getElementById('screen-element').style.display='block';
  elQueue=shuffle([...Array(QDB.element_number.length).keys()]);
  elIdx=0; elScore=0; elWrongIdxs=[];
  elBuild();
}

function elRetryWrong(){
  if(elWrongIdxs.length===0) return;
  elQueue=[...elWrongIdxs];
  elWrongIdxs=[];
  elIdx=0; elScore=0;
  document.getElementById('screen-element-finish').style.display='none';
  document.getElementById('screen-element').style.display='block';
  elBuild();
}

</script>
</body>
